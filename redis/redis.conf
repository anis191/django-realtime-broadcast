############################################
# Redis Production Configuration (Docker)
############################################

# Bind to all interfaces (safe inside Docker network)
bind 0.0.0.0

# Default Redis port
port 6379


############################################
# SECURITY
############################################

# Inside Docker we can safely disable protected mode
protected-mode no


############################################
# ACL AUTHENTICATION
############################################

# Disable the default user completely
user default off

# Create a secure ACL user for your application
# It will be automatically replaced at container startup from .env
user anis on >YOUR_SECURE_REDIS_PASSWORD_HERE ~* &* +@all


############################################
# PERSISTENCE
############################################

# Enable AOF (Append Only File) for durability
appendonly yes
appendfilename "appendonly.aof"

# RDB snapshot rules
save 900 1
save 300 10
save 60 10000


############################################
# MEMORY MANAGEMENT
############################################

maxmemory 256mb
maxmemory-policy allkeys-lru


############################################
# LOGGING
############################################

# Log level
loglevel notice

# Log file - empty means log to stdout (Docker best practice)
logfile ""


############################################
# SECURITY HARDENING
############################################

# Disable dangerous commands to protect data
rename-command FLUSHDB ""
rename-command FLUSHALL ""
# rename-command CONFIG ""
rename-command SHUTDOWN ""